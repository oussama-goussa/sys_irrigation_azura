# ============================================================
# alembic.ini — Configuration Alembic
# Projet Azura Irrigation IA — GOUSSA Oussama
# ============================================================

[alembic]
# Chemin vers le dossier migrations
script_location = alembic

# Format des noms de fichiers migration
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

# Timezone pour les fichiers migration
timezone = Africa/Casablanca

# URL de la DB — sera remplacée par env variable dans env.py
sqlalchemy.url = postgresql://azura_user:azura_test_2026@db:5432/azura_irrigation

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S