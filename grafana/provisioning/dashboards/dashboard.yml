# ============================================================
# grafana/provisioning/dashboards/dashboard.yml
# ============================================================

apiVersion: 1

providers:
  - name: Azura Dashboards
    orgId: 1
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false
