# ============================================================
# docker-compose.yml — Azura Irrigation IA
# Avec Frontend React ajouté
# ============================================================

networks:
  azura_internal:
    driver: bridge

services:

  # ── 1. PostgreSQL + TimescaleDB ──────────────────────────
  db:
    image: timescale/timescaledb:latest-pg15
    container_name: azura_db
    env_file: .env
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U azura_user -d azura_irrigation"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - azura_internal
    restart: unless-stopped

  # ── 2. Redis ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: azura_redis

    command: >
      redis-server --requirepass ${REDIS_PASSWORD}

    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}

    networks:
      - azura_internal

    restart: unless-stopped

  # ── 3. Backend FastAPI ───────────────────────────────────
  backend:
    build: ./backend
    container_name: azura_backend
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    volumes:
      - ./backend:/app
    networks:
      - azura_internal
    ports:
      - "8000:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload --timeout-keep-alive 120
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── 4. Frontend React (NOUVEAU) ──────────────────────────
  frontend:
    build: ./frontend
    container_name: azura_frontend
    environment:
      # URL de l'API — utilisée par le proxy Vite en dev
      VITE_API_URL: http://backend:8000
    volumes:
      - ./frontend:/app
      # Exclure node_modules du volume (utiliser celui du container)
      - /app/node_modules
    networks:
      - azura_internal
    ports:
      - "5173:5173"
    depends_on:
      - backend
    restart: unless-stopped

  # ── 5. Celery Worker ────────────────────────────────────
  celery_worker:
    build: ./backend
    container_name: azura_celery_worker
    command: celery -A core.celery_app worker --loglevel=info
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      - backend
      - redis
      - db
    networks:
      - azura_internal
    restart: unless-stopped

  # ── 6. Celery Beat ───────────────────────────────────────
  celery_beat:
    build: ./backend
    container_name: azura_celery_beat
    command: celery -A core.celery_app beat --loglevel=info
    env_file: .env
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
    volumes:
      - ./backend:/app
    depends_on:
      - celery_worker
    networks:
      - azura_internal
    restart: unless-stopped

  # ── 7. Grafana ───────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: azura_grafana
    env_file: .env
    environment:
      # Identifiants admin Grafana
      GF_SECURITY_ADMIN_USER:     ${GRAFANA_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      # Désactiver la page de login (accès direct depuis React iFrame)
      GF_AUTH_ANONYMOUS_ENABLED:  "false"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"
      # Autoriser l'embed dans des iFrames
      GF_SECURITY_ALLOW_EMBEDDING: "false"
      # Désactiver le X-Frame-Options restrictif
      GF_SECURITY_COOKIE_SAMESITE: "none"
      # URL publique utilisée par React pour construire les iFrames
      GF_SERVER_ROOT_URL:         http://localhost:3000
      GF_SERVER_HTTP_PORT:        "3000"
    volumes:
      - grafana_data:/var/lib/grafana
      # Provisioning automatique datasource TimescaleDB
      - ./grafana/provisioning:/etc/grafana/provisioning
    networks:
      - azura_internal
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  grafana_data: